# Local development infrastructure for the Prediction Market Aggregator.
#
# Brings up the two datastores the system depends on (see design.md
# "Dependencies"):
#   - Postgres with the TimescaleDB extension (relational metadata + the
#     price_point hypertable for time-series prices).
#   - Redis (hot latest-price cache + pub/sub for the WebSocket fan-out).
#
# Usage:
#   docker compose up -d        # start datastores in the background
#   docker compose down         # stop and remove containers
#   docker compose down -v      # also remove the named volumes (wipes data)

services:
  postgres:
    # TimescaleDB image bundles Postgres + the TimescaleDB extension so a single
    # stack serves both relational metadata and the price_point hypertable.
    image: timescale/timescaledb:2.17.2-pg16
    container_name: pma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pma
      POSTGRES_PASSWORD: pma
      POSTGRES_DB: pma
    ports:
      - "5432:5432"
    volumes:
      - pma-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pma -d pma"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pma-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - pma-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pma-postgres-data:
  pma-redis-data:
