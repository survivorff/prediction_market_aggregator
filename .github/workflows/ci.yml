name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    # Ephemeral datastores so the integration tests run against a clean DB
    # (the integration suite assumes an isolated database — see
    # gateway.integration.test.ts / repositories.integration.test.ts).
    services:
      postgres:
        image: timescale/timescaledb:2.17.2-pg16
        env:
          POSTGRES_USER: pma
          POSTGRES_PASSWORD: pma
          POSTGRES_DB: pma
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pma -d pma"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://pma:pma@localhost:5432/pma
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npm run migrate --workspace @pma/storage

      - name: Build (tsc project graph)
        run: npm run build

      - name: Typecheck web frontend
        run: npm run typecheck --workspace @pma/web

      - name: Lint
        run: npm run lint

      - name: Test (unit + property + integration)
        run: npm test
